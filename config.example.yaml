# tc-limit — Smart Bandwidth Limit Daemon
# Copy to /etc/tc-limit/config.yaml and edit to suit your environment.
#
# All time values in seconds, traffic in MB, bandwidth in Mbps.
# Values may be bare integers or expressions like "5 * 60".

# ── Bandwidth Limits ──
limits:
  higher:    150           # Mbps — normal operating rate
  lower:     110           # Mbps — limited rate
  threshold: 120           # Mbps — alert line

# ── Sampling Window ──
window:
  duration:  300           # seconds (5 * 60)
  interval:  5             # seconds

# ── Burst Detection ──
burst:
  enabled:      false
  window:       180        # seconds (3 * 60)
  threshold_mb: 1024       # MB — trigger if this much data passes in window

cooldown:       180        # seconds (3 * 60)
recovery_steps: 1          # 1 = instant recovery; 2+ = ramp in steps

# ── Network ──
network:
  interface: ""            # empty = auto-detect default route interface
  burst_kbit: 16           # kbit — tc HTB token bucket burst

# ── Runtime ──
runtime:
  dry_run:   false
  log_level: "INFO"        # DEBUG | INFO | WARN | ERROR
  state_file: "/run/tc-limit/state.json"
  pid_file:   "/run/tc-limit/daemon.pid"

# ── Storage ──
storage:
  enabled: false
  path: "/var/lib/tc-limit/metrics.db"
  commit_interval: 60
  retention_days: 90
